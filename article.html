<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">מאמר | אלמוג בן דוד, רו"ח</title>
  <meta name="description" id="page-desc" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0E1E40;
      --navy-mid: #1B3358;
      --gold: #C9A84C;
      --gold-light: #E8C96A;
      --white: #FFFFFF;
      --light: #F7F9FC;
      --border: #E2E8F0;
      --text: #0E1E40;
      --text-mid: #4A5568;
      --text-light: #718096;
      --radius: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { direction: rtl; scroll-behavior: smooth; }
    body {
      font-family: 'Heebo', sans-serif;
      direction: rtl;
      text-align: right;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    /* ── NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand {
      font-size: 1.05rem; font-weight: 800; color: var(--navy);
      display: flex; align-items: center; gap: 10px;
    }
    .nav-back {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.88rem; font-weight: 600; color: var(--text-light);
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--navy); }
    .nav-back svg { transform: rotate(180deg); }

    /* ── HERO ── */
    .article-hero {
      background: var(--light);
      padding: 64px 24px 0;
    }
    .article-hero-inner {
      max-width: 820px; margin: 0 auto;
    }
    .article-cat-badge {
      display: inline-flex; align-items: center;
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.3px;
      padding: 5px 14px; border-radius: 50px;
      background: rgba(14,30,64,0.07); color: var(--navy);
      margin-bottom: 20px;
    }
    .article-hero h1 {
      font-size: clamp(1.6rem, 3.5vw, 2.3rem);
      font-weight: 800;
      color: var(--navy);
      line-height: 1.3;
      margin-bottom: 20px;
      letter-spacing: -0.3px;
    }
    .article-meta-row {
      display: flex; align-items: center; gap: 20px;
      font-size: 0.82rem; color: var(--text-light);
      margin-bottom: 36px; flex-wrap: wrap;
    }
    .article-meta-row span {
      display: flex; align-items: center; gap: 5px;
    }

    /* ── HERO IMAGE ── */
    .article-hero-img-wrap {
      max-width: 820px; margin: 0 auto;
      border-radius: 20px 20px 0 0;
      overflow: hidden;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #EBF5FB 0%, #D4E6F1 100%);
    }
    .article-hero-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
    }

    /* ── BODY ── */
    .article-body-wrap {
      max-width: 820px; margin: 0 auto;
      padding: 52px 24px 80px;
    }

    /* Article content typography */
    .article-content p { margin-bottom: 20px; }
    .article-content .article-lead {
      font-size: 1.12rem; line-height: 1.8;
      color: var(--text-mid);
      border-right: 3px solid var(--gold);
      padding-right: 18px;
      margin-bottom: 36px;
    }
    .article-content h2 {
      font-size: 1.35rem; font-weight: 800;
      color: var(--navy);
      margin: 40px 0 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid rgba(14,30,64,0.07);
    }
    .article-content h3 {
      font-size: 1.05rem; font-weight: 700;
      color: var(--navy);
      margin: 24px 0 10px;
    }
    .article-content ul, .article-content ol {
      padding-right: 20px;
      margin-bottom: 20px;
    }
    .article-content li {
      margin-bottom: 8px;
      line-height: 1.7;
      color: var(--text-mid);
    }
    .article-content li::marker { color: var(--gold); }
    .article-content strong { color: var(--navy); font-weight: 700; }

    /* Tables */
    .article-table-wrap {
      overflow-x: auto;
      margin: 20px 0 28px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .article-table {
      width: 100%; border-collapse: collapse;
      font-size: 0.90rem;
    }
    .article-table thead { background: var(--navy); color: var(--white); }
    .article-table thead th {
      padding: 13px 16px;
      font-weight: 700; text-align: right;
    }
    .article-table tbody tr { border-bottom: 1px solid var(--border); }
    .article-table tbody tr:last-child { border-bottom: none; }
    .article-table tbody tr:nth-child(even) { background: var(--light); }
    .article-table td { padding: 11px 16px; color: var(--text-mid); }

    /* CTA box inside article */
    .article-cta-box {
      background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(232,201,106,0.12));
      border: 1px solid rgba(201,168,76,0.22);
      border-radius: 16px;
      padding: 28px 32px;
      margin: 40px 0 0;
      line-height: 1.8;
      color: var(--text-mid);
      font-size: 0.97rem;
    }
    .article-cta-box strong {
      display: block;
      font-size: 1.05rem;
      color: var(--navy);
      margin-bottom: 6px;
    }

    /* ── AUTHOR CARD ── */
    .author-card {
      display: flex; align-items: center; gap: 20px;
      background: var(--light);
      border-radius: 16px;
      padding: 24px 28px;
      margin-top: 48px;
      border: 1px solid var(--border);
    }
    .author-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, var(--navy), var(--navy-mid));
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-size: 1.5rem; font-weight: 800;
      flex-shrink: 0;
    }
    .author-name { font-size: 1rem; font-weight: 800; color: var(--navy); margin-bottom: 3px; }
    .author-title { font-size: 0.85rem; color: var(--text-light); }

    /* ── CTA SECTION ── */
    .article-cta-section {
      background: var(--navy);
      padding: 80px 24px;
      text-align: center;
      margin-top: 72px;
    }
    .article-cta-section h2 {
      font-size: clamp(1.4rem, 3vw, 1.9rem);
      font-weight: 800; color: var(--white);
      margin-bottom: 14px;
    }
    .article-cta-section p {
      font-size: 1rem; color: rgba(255,255,255,0.72);
      margin-bottom: 32px; max-width: 500px; margin-inline: auto;
    }
    .btn-gold {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 15px 36px; border-radius: 50px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy); font-family: inherit;
      font-size: 1rem; font-weight: 700; text-decoration: none;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(201,168,76,0.40); }

    /* ── NOT FOUND ── */
    .not-found {
      max-width: 500px; margin: 120px auto; text-align: center;
      padding: 0 24px;
    }
    .not-found h1 { font-size: 1.6rem; color: var(--navy); margin-bottom: 14px; }
    .not-found p { color: var(--text-light); margin-bottom: 28px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .article-hero { padding: 40px 16px 0; }
      .article-body-wrap { padding: 36px 16px 60px; }
      .article-cta-box { padding: 22px 20px; }
      .author-card { flex-direction: column; text-align: center; }
      .article-table { font-size: 0.82rem; }
      .article-table td, .article-table th { padding: 9px 12px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-brand">אלמוג בן דוד, רו"ח</div>
    <a href="index .html#articles" class="nav-back">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 4l-4 4 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      חזרה למאמרים
    </a>
  </nav>

  <!-- ARTICLE PLACEHOLDER (populated by JS) -->
  <div id="article-root"></div>

  <!-- CTA SECTION -->
  <section class="article-cta-section" id="contact">
    <h2>מוכנים לקחת את הצעד הבא?</h2>
    <p>בדיקה ראשונית חינם, ללא התחייבות. אחזור אליכם תוך 24 שעות.</p>
    <a href="https://wa.me/972500000000" class="btn-gold">
      שלחו הודעה בוואטסאפ ←
    </a>
  </section>

  <script src="js/articles-content.js"></script>
  <script>
  (function () {
    const params = new URLSearchParams(location.search);
    const slug = params.get('slug') || '';
    const data = window.ARTICLES_CONTENT && window.ARTICLES_CONTENT[slug];
    const root = document.getElementById('article-root');

    if (!data) {
      root.innerHTML = `
        <div class="not-found">
          <h1>המאמר לא נמצא</h1>
          <p>ייתכן שהכתובת שגויה או שהמאמר הוסר.</p>
          <a href="index .html#articles" class="btn-gold" style="display:inline-flex">חזרה למאמרים ←</a>
        </div>`;
      return;
    }

    // Set page title + meta
    document.getElementById('page-title').textContent = data.title + ' | אלמוג בן דוד, רו"ח';
    document.getElementById('page-desc').setAttribute('content', data.title);

    // Render
    root.innerHTML = `
      <section class="article-hero">
        <div class="article-hero-inner">
          <span class="article-cat-badge">${data.categoryLabel}</span>
          <h1>${data.title}</h1>
          <div class="article-meta-row">
            <span>
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <rect x="1" y="2" width="11" height="10" rx="2" stroke="currentColor" stroke-width="1.3"/>
                <path d="M4.5 1v2M8.5 1v2M1 5.5h11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              </svg>
              ${data.date}
            </span>
            <span>
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.3"/>
                <path d="M6.5 4V6.5l1.7 1.7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              </svg>
              ${data.readTime}
            </span>
          </div>
        </div>
        <div class="article-hero-img-wrap">
          <img
            src="${data.image}"
            alt="${data.imageAlt}"
            loading="eager"
            onerror="this.parentNode.style.background='linear-gradient(135deg,#EBF5FB,#D4E6F1)';this.style.display='none'"
          >
        </div>
      </section>

      <div class="article-body-wrap">
        <div class="article-content">
          ${data.body}
        </div>

        <div class="author-card">
          <div class="author-avatar">א</div>
          <div>
            <div class="author-name">אלמוג בן דוד</div>
            <div class="author-title">רואת חשבון מוסמכת · B.A כלכלה וחשבונאות, אוניברסיטת בן גוריון · 10+ שנות ניסיון</div>
          </div>
        </div>
      </div>
    `;
  })();
  </script>
</body>
</html>
